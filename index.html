  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header"><div className="modal-title">{ref_?'Edit Reference':'Add Reference'}</div><button className="modal-close" onClick={onClose}>×</button></div>
        <div className="modal-body">
          <div className="grid-2">
            <div className="field"><label>Reference Name *</label><input placeholder="John Doe" value={form.name} onChange={e=>update('name',e.target.value)}/></div>
            <div className="field"><label>Relationship</label>
              <select value={form.relationship} onChange={e=>update('relationship',e.target.value)}>
                {['Former Manager','Peer','Direct Report','Client','Mentor'].map(r=><option key={r} value={r}>{r}</option>)}
              </select>
            </div>
          </div>
          <div className="grid-2">
            <div className="field"><label>Title</label><input placeholder="VP of Sales" value={form.title||''} onChange={e=>update('title',e.target.value)}/></div>
            <div className="field"><label>Company</label><input placeholder="Acme Corp" value={form.company||''} onChange={e=>update('company',e.target.value)}/></div>
          </div>
          <div className="grid-2">
            <div className="field"><label>Email</label><input placeholder="john@acme.com" value={form.email||''} onChange={e=>update('email',e.target.value)}/></div>
            <div className="field"><label>Status</label>
              <select value={form.status} onChange={e=>update('status',e.target.value)}>
                {['Pending','Scheduled','Completed'].map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
          </div>
          {form.status==='Completed' && <>
            <div className="grid-2">
              <div className="field"><label>Overall Rating (1-5)</label>
                <select value={form.rating} onChange={e=>update('rating',e.target.value)}>
                  <option value="">Select...</option>
                  {[1,2,3,4,5].map(n=><option key={n} value={n}>{n} — {scoreLabel(n)}</option>)}
                </select>
              </div>
              <div className="field"><label>Would Rehire?</label>
                <select value={form.wouldRehire} onChange={e=>update('wouldRehire',e.target.value)}>
                  <option value="">Select...</option>
                  <option>Yes</option><option>No</option><option>Unsure</option>
                </select>
              </div>
            </div>
            <div className="field"><label>Notes from Call</label><textarea placeholder="Key takeaways..." value={form.notes||''} onChange={e=>update('notes',e.target.value)}/></div>
            <div className="field"><label>Red Flags (if any)</label><input placeholder="Any concerns noted..." value={form.redFlags||''} onChange={e=>update('redFlags',e.target.value)}/></div>
          </>}
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={()=>form.name&&onSave(form)} disabled={!form.name}>
            {ref_?'Save Changes':'Add Reference'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   COMPARISON VIEW
   ═══════════════════════════════════════ */
function ComparisonView({ candidates, positions }) {
  const [selPos, setSelPos] = useState('');
  const [selCands, setSelCands] = useState([]);

  const pos = positions.find(p=>p.id===selPos);
  const candsByPos = selPos ? candidates.filter(c=>c.positionId===selPos) : [];

  const toggleCand = (id) => {
    if (selCands.includes(id)) setSelCands(s=>s.filter(x=>x!==id));
    else if (selCands.length<4) setSelCands(s=>[...s,id]);
  };

  const compareCands = candidates.filter(c=>selCands.includes(c.id));

  return (
    <div className="page">
      <div className="page-header">
        <div><div className="page-title">Candidate Comparison</div><div className="page-sub">Side-by-side comparison with weighted scores</div></div>
      </div>
      <div className="grid-2 mb-4">
        <div className="field" style={{margin:0}}>
          <label>Position</label>
          <select value={selPos} onChange={e=>{setSelPos(e.target.value);setSelCands([])}}>
            <option value="">Select position...</option>
            {positions.map(p=><option key={p.id} value={p.id}>{p.title}</option>)}
          </select>
        </div>
      </div>
      {selPos && <div className="mb-4">
        <div className="section-title">Select Candidates to Compare (up to 4)</div>
        <div className="flex" style={{flexWrap:'wrap',gap:6}}>
          {candsByPos.map(c=>(
            <button key={c.id} className="chip" style={selCands.includes(c.id)?{borderColor:'var(--accent)',color:'var(--accent)',background:'rgba(79,142,247,.08)'}:{}} onClick={()=>toggleCand(c.id)}>
              {selCands.includes(c.id)?'✓ ':''}{c.name}
            </button>
          ))}
        </div>
      </div>}

      {compareCands.length>0 && pos && <>
        <div className="card" style={{padding:0,overflowX:'auto'}}>
          <table className="compare-table">
            <thead>
              <tr>
                <th style={{minWidth:180}}>Requirement</th>
                <th style={{minWidth:80}}>Weight</th>
                {compareCands.map(c=><th key={c.id} style={{minWidth:140}}>{c.name}</th>)}
              </tr>
            </thead>
            <tbody>
              {(pos.requirements||[]).map(req=>(
                <tr key={req.id}>
                  <td className="req-col">
                    {req.name}
                    {req.mustHave && <span className="badge badge-red ml-1" style={{fontSize:10}}>Must Have</span>}
                  </td>
                  <td className="text-muted text-xs">{req.weight}×</td>
                  {compareCands.map(c=>{
                    const s=(c.scores||{})[req.id];
                    return <td key={c.id} className="score-cell">
                      {s?.score
                        ? <span style={{color:scoreColor(s.score),fontWeight:700,fontFamily:'var(--mono)'}}>{s.score}</span>
                        : <span className="text-muted">—</span>}
                    </td>;
                  })}
                </tr>
              ))}
              <tr style={{background:'var(--surface2)'}}>
                <td colSpan={2} style={{fontWeight:700}}>Overall Weighted Score</td>
                {compareCands.map(c=>{
                  const sc = calcWeightedScore(c.scores||{}, pos.requirements||[]);
                  return <td key={c.id} className="score-cell">
                    <span style={{fontWeight:700,color:sc>=80?'var(--accent3)':sc>=60?'var(--accent)':sc?'var(--yellow)':'var(--muted)',fontFamily:'var(--mono)',fontSize:16}}>
                      {sc!=null?`${sc}%`:'—'}
                    </span>
                  </td>;
                })}
              </tr>
              <tr>
                <td colSpan={2} style={{fontWeight:600,fontSize:12,color:'var(--muted)'}}>Recommendation</td>
                {compareCands.map(c=>(
                  <td key={c.id} className="score-cell">
                    {c.recommendation
                      ? <span className={`badge ${c.recommendation.includes('Yes')?'badge-green':c.recommendation==='Maybe'?'badge-yellow':'badge-red'}`}>{c.recommendation}</span>
                      : <span className="text-muted">—</span>}
                  </td>
                ))}
              </tr>
            </tbody>
          </table>
        </div>
      </>}

      {!selPos && <div className="empty-state"><div className="empty-icon">⚖️</div><div className="empty-title">Select a position to compare candidates</div></div>}
    </div>
  );
}

/* ═══════════════════════════════════════
   TEAM SCORING (Interviewer Portal)
   ═══════════════════════════════════════ */
function TeamScoringView({ positions, candidates, setCandidates }) {
  const [selPos, setSelPos] = useState('');
  const [selCand, setSelCand] = useState('');
  const [copied, setCopied] = useState(false);

  const pos = positions.find(p=>p.id===selPos);
  const cand = candidates.find(c=>c.id===selCand);

  const shareLink = selCand ? `${window.location.href.split('?')[0]}?scorecard=${selCand}` : '';

  const copy = () => {
    navigator.clipboard.writeText(shareLink);
    setCopied(true);
    setTimeout(()=>setCopied(false),2000);
  };

  const teamScores = cand?.teamScores || [];

  return (
    <div className="page">
      <div className="page-header">
        <div><div className="page-title">Team Scoring</div><div className="page-sub">Share scorecards with interviewers for their ratings</div></div>
      </div>
      <div className="grid-2 mb-4">
        <div className="field" style={{margin:0}}>
          <label>Position</label>
          <select value={selPos} onChange={e=>{setSelPos(e.target.value);setSelCand('')}}>
            <option value="">Select position...</option>
            {positions.map(p=><option key={p.id} value={p.id}>{p.title}</option>)}
          </select>
        </div>
        <div className="field" style={{margin:0}}>
          <label>Candidate</label>
          <select value={selCand} onChange={e=>setSelCand(e.target.value)}>
            <option value="">Select candidate...</option>
            {candidates.filter(c=>!selPos||c.positionId===selPos).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
      </div>

      {selCand && cand && <>
        <div className="card mb-4">
          <div className="section-title">Shareable Scorecard Link</div>
          <div className="text-muted text-sm mb-3">Send this link to interviewers. They can submit their scores without needing an account.</div>
          <div className="share-code-box">
            <div className="share-code" style={{fontSize:13,wordBreak:'break-all'}}>{shareLink}</div>
            <button className="btn btn-primary btn-sm" onClick={copy}>{copied?'✓ Copied!':'📋 Copy'}</button>
          </div>
        </div>

        <div className="card">
          <div className="section-title">Team Submissions ({teamScores.length})</div>
          {teamScores.length===0
            ? <div className="text-muted text-sm">No team scores submitted yet. Share the link above with your interviewers.</div>
            : teamScores.map((ts,i)=>(
                <div key={i} style={{padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                  <div className="flex items-center justify-between">
                    <div style={{fontWeight:600}}>{ts.evaluatorName}</div>
                    <span className={`badge ${ts.recommendation?.includes('Yes')?'badge-green':ts.recommendation==='Maybe'?'badge-yellow':'badge-red'}`}>{ts.recommendation}</span>
                  </div>
                  <div className="text-muted text-xs mt-1">{ts.evaluatorEmail} · Submitted {fmtDate(ts.submittedAt)}</div>
                </div>
              ))
          }
        </div>
      </>}

      {!selCand && <div className="empty-state"><div className="empty-icon">🔗</div><div className="empty-title">Select a candidate to generate share link</div></div>}
    </div>
  );
}

/* ═══════════════════════════════════════
   EXTERNAL INTERVIEWER SCORECARD
   (shown when URL has ?scorecard=xxx)
   ═══════════════════════════════════════ */
function ExternalScorecard({ candidateId, candidates, setCandidates, positions }) {
  const [step, setStep] = useState(1);
  const [evaluator, setEvaluator] = useState({ name:'', email:'' });
  const [scores, setScores] = useState({});
  const [recommendation, setRecommendation] = useState('');
  const [notes, setNotes] = useState('');
  const [submitted, setSubmitted] = useState(false);

  const cand = candidates.find(c=>c.id===candidateId);
  const pos = cand ? positions.find(p=>p.id===cand.positionId) : null;

  if (!cand || !pos) return <div className="external-bg"><div className="external-card"><div style={{textAlign:'center',color:'var(--muted)'}}>Scorecard not found.</div></div></div>;

  const submit = () => {
    const submission = { evaluatorName:evaluator.name, evaluatorEmail:evaluator.email, scores, recommendation, notes, submittedAt:today() };
    setCandidates(cs=>cs.map(c=>c.id===candidateId?{...c,teamScores:[...(c.teamScores||[]),submission]}:c));
    setSubmitted(true);
  };

  if (submitted) return (
    <div className="external-bg">
      <div className="external-card" style={{textAlign:'center'}}>
        <div style={{fontSize:48,marginBottom:16}}>✅</div>
        <div style={{fontSize:22,fontWeight:700,marginBottom:8}}>Thank you, {evaluator.name}!</div>
        <div className="text-muted">Your scorecard for <strong>{cand.name}</strong> has been submitted.</div>
      </div>
    </div>
  );

  return (
    <div className="external-bg">
      <div className="external-card">
        <div className="auth-brand" style={{marginBottom:4}}>Hiring Command Center</div>
        <div className="text-muted text-sm mb-4">Interview Scorecard</div>
        <div style={{fontSize:20,fontWeight:700}}>{cand.name}</div>
        <div className="text-muted text-sm mb-4">{pos.title}</div>
        <hr className="divider"/>

        {step===1 && <>
          <div className="section-title">Your Information</div>
          <div className="field"><label>Your Name *</label><input placeholder="Jane Smith" value={evaluator.name} onChange={e=>setEvaluator(ev=>({...ev,name:e.target.value}))}/></div>
          <div className="field"><label>Your Email</label><input type="email" placeholder="jane@company.com" value={evaluator.email} onChange={e=>setEvaluator(ev=>({...ev,email:e.target.value}))}/></div>
          <button className="btn btn-primary btn-full mt-2" onClick={()=>evaluator.name&&setStep(2)} disabled={!evaluator.name}>Start Scoring →</button>
        </>}

        {step===2 && <>
          <div className="section-title">Rate the Candidate</div>
          {(pos.requirements||[]).length===0 && <div className="text-muted text-sm">No requirements defined for this position.</div>}
          {(pos.requirements||[]).map(req=>(
            <div key={req.id} className="card-sm mb-3" style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8}}>
              <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>{req.name}{req.mustHave&&<span className="badge badge-red ml-2" style={{fontSize:10}}>Must Have</span>}</div>
              <ScoreBtns value={scores[req.id]?.score} onChange={v=>setScores(s=>({...s,[req.id]:{...s[req.id],score:v}}))}/>
              {scores[req.id]?.score && <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>{scoreLabel(scores[req.id].score)}</div>}
              <input className="mt-2" style={{fontSize:12,padding:'6px 10px'}} placeholder="Optional note..." value={scores[req.id]?.note||''} onChange={e=>setScores(s=>({...s,[req.id]:{...s[req.id],note:e.target.value}}))}/>
            </div>
          ))}
          <div className="field mt-4">
            <label>Overall Recommendation</label>
            <div className="flex" style={{flexWrap:'wrap',gap:6}}>
              {['Strong Yes','Yes','Maybe','No','Strong No'].map(r=>(
                <button key={r} className={`btn btn-sm ${recommendation===r?'btn-primary':'btn-secondary'}`} onClick={()=>setRecommendation(r)}>{r}</button>
              ))}
            </div>
          </div>
          <div className="field">
            <label>Overall Notes</label>
            <textarea placeholder="Your overall impression of the candidate..." value={notes} onChange={e=>setNotes(e.target.value)}/>
          </div>
          <button className="btn btn-primary btn-full" onClick={submit}>Submit Scorecard ✓</button>
        </>}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════ */
function App() {
  const [user, setUser] = useState(null);
  const [org, setOrg] = useState(null);
  const [view, setView] = useState('dashboard');
  const [positions, setPositionsState] = useState([]);
  const [candidates, setCandidatesState] = useState([]);
  const [requirements, setRequirementsState] = useState(DEFAULT_REQUIREMENTS);

  // Check URL for external scorecard
  const urlParams = new URLSearchParams(window.location.search);
  const scorecardId = urlParams.get('scorecard');

  // Persist to localStorage
  useEffect(()=>{ if(user) localStorage.setItem('hcc_positions_'+user.orgId, JSON.stringify(positions)); },[positions,user]);
  useEffect(()=>{ if(user) localStorage.setItem('hcc_candidates_'+user.orgId, JSON.stringify(candidates)); },[candidates,user]);
  useEffect(()=>{ if(user) localStorage.setItem('hcc_requirements_'+user.orgId, JSON.stringify(requirements)); },[requirements,user]);

  const setPositions = (fn) => setPositionsState(fn);
  const setCandidates = (fn) => setCandidatesState(fn);
  const setRequirements = (fn) => setRequirementsState(fn);

  // Restore Supabase session on load
  useEffect(()=>{
    if (!DEMO_MODE && supabase) {
      supabase.auth.getSession().then(async ({ data: { session } }) => {
        if (session) {
          const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
          if (profile) {
            const { data: org } = await supabase.from('organizations').select('*').eq('id', profile.org_id).single();
            const user = { id: session.user.id, name: profile.name, email: profile.email, orgId: profile.org_id, role: profile.role };
            setUser(user); setOrg(org);
            const p = localStorage.getItem('hcc_positions_'+profile.org_id);
            const c = localStorage.getItem('hcc_candidates_'+profile.org_id);
            const r = localStorage.getItem('hcc_requirements_'+profile.org_id);
            if (p) setPositionsState(JSON.parse(p));
            if (c) setCandidatesState(JSON.parse(c));
            if (r) setRequirementsState(JSON.parse(r));
          }
        }
      });
    }
  },[]);

  // Check for existing demo session
  useEffect(()=>{
    const session = storage.get('hcc_session', null);
    if (session && session.id && (!session.expiresAt || session.expiresAt > Date.now())) {
      // Refresh expiry on each visit
      storage.set('hcc_session', {...session, expiresAt: Date.now() + 30*24*60*60*1000});
      const orgData = storage.get('hcc_orgs', []).find(o=>o.id===session.orgId);
      setUser(session);
      setOrg(orgData);
      // Load org data
      const p = localStorage.getItem('hcc_positions_'+session.orgId);
      const c = localStorage.getItem('hcc_candidates_'+session.orgId);
      const r = localStorage.getItem('hcc_requirements_'+session.orgId);
      if (p) setPositionsState(JSON.parse(p));
      if (c) setCandidatesState(JSON.parse(c));
      if (r) setRequirementsState(JSON.parse(r));
    }
  },[]);

  // If external scorecard link
  if (scorecardId) {
    return <ExternalScorecard candidateId={scorecardId} candidates={candidates} setCandidates={setCandidates} positions={positions}/>;
  }

  if (!user) {
    return <AuthScreen onAuth={(u,o)=>{
      setUser(u); setOrg(o);
      const p = localStorage.getItem('hcc_positions_'+u.orgId);
      const c = localStorage.getItem('hcc_candidates_'+u.orgId);
      const r = localStorage.getItem('hcc_requirements_'+u.orgId);
      if (p) setPositionsState(JSON.parse(p));
      if (c) setCandidatesState(JSON.parse(c));
      if (r) setRequirementsState(JSON.parse(r));
    }}/>;
  }

  const NAV = [
    { id:'dashboard', icon:'🏠', label:'Dashboard' },
    { id:'positions', icon:'📋', label:'Positions' },
    { id:'candidates', icon:'👤', label:'Candidates' },
    { id:'scorecards', icon:'⭐', label:'Scorecards' },
    { id:'interviews', icon:'🎙️', label:'Interview Notes' },
    { id:'references', icon:'📞', label:'Reference Checks' },
    { id:'comparison', icon:'⚖️', label:'Comparison' },
    { id:'team', icon:'🔗', label:'Team Scoring' },
    { id:'jdbuilder', icon:'✍️', label:'JD Builder' },
    { id:'requirements', icon:'📚', label:'Requirements Library' },
  ];

  const renderView = () => {
    switch(view) {
      case 'dashboard': return <Dashboard user={user} org={org} positions={positions} candidates={candidates}/>;
      case 'positions': return <PositionsView positions={positions} setPositions={setPositions} requirements={requirements} candidates={candidates}/>;
      case 'candidates': return <CandidatesView candidates={candidates} setCandidates={setCandidates} positions={positions}/>;
      case 'scorecards': return <ScorecardsView candidates={candidates} setCandidates={setCandidates} positions={positions}/>;
      case 'interviews': return <InterviewsView candidates={candidates} setCandidates={setCandidates} positions={positions}/>;
      case 'references': return <ReferenceChecksView candidates={candidates} setCandidates={setCandidates} positions={positions}/>;
      case 'comparison': return <ComparisonView candidates={candidates} positions={positions}/>;
      case 'team': return <TeamScoringView positions={positions} candidates={candidates} setCandidates={setCandidates}/>;
      case 'jdbuilder': return <JDBuilderView positions={positions} setPositions={setPositions} requirements={requirements}/>;
      case 'requirements': return <RequirementsView requirements={requirements} setRequirements={setRequirements}/>;
      default: return null;
    }
  };

  const initials = user.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-brand">
          <div className="sidebar-brand-name">Hiring CC</div>
          <div className="sidebar-org">{org?.name||'My Organization'}</div>
        </div>
        <div className="nav-section">
          {NAV.map(n=>(
            <button key={n.id} className={`nav-item ${view===n.id?'active':''}`} onClick={()=>setView(n.id)}>
              <span className="nav-icon">{n.icon}</span>{n.label}
            </button>
          ))}
        </div>
        <div className="sidebar-footer">
          <div className="user-pill">
            <div className="user-avatar">{initials}</div>
            <div className="user-info">
              <div className="user-name">{user.name}</div>
              <div className="user-role">{user.role}</div>
            </div>
          </div>
          <button className="btn btn-ghost btn-sm btn-full mt-2" style={{justifyContent:'flex-start',gap:8}} onClick={()=>{storage.set('hcc_session',null);setUser(null);setOrg(null);}}>
            🚪 Sign Out
          </button>
        </div>
      </div>
      <div className="main">{renderView()}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
