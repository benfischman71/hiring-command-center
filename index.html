<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hiring Command Center</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:#090c12; --surface:#111520; --surface2:#181e2e; --surface3:#1f2638;
  --border:#252d42; --border2:#2e3850;
  --accent:#4f8ef7; --accent2:#7c5cfc; --accent3:#2dd4a0;
  --red:#f75c5c; --yellow:#f7c94f; --orange:#f7834f;
  --text:#e4eaf8; --text2:#a8b3cc; --muted:#5c6882;
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  --r:10px; --r2:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ── AUTH ─────────────────────────────── */
.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 20%,rgba(79,142,247,.08) 0%,transparent 60%),
             radial-gradient(ellipse at 70% 80%,rgba(124,92,252,.06) 0%,transparent 60%),var(--bg)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:44px;width:100%;max-width:440px;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.auth-brand{font-size:20px;font-weight:700;letter-spacing:-.02em;
  background:linear-gradient(130deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.auth-tagline{color:var(--muted);font-size:13px;margin-bottom:32px}
.auth-tabs{display:flex;gap:6px;margin-bottom:28px;background:var(--surface2);padding:4px;border-radius:10px}
.auth-tab{flex:1;padding:9px;border:none;background:transparent;color:var(--muted);
  border-radius:7px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:all .2s}
.auth-tab.active{background:var(--surface3);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3)}

/* ── FORM ─────────────────────────────── */
.field{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;
  letter-spacing:.07em;margin-bottom:6px}
input,select,textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:var(--r);padding:10px 13px;color:var(--text);font-family:var(--font);
  font-size:14px;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{resize:vertical;min-height:90px}
select option{background:var(--surface2)}
.error-msg{color:var(--red);font-size:12px;margin-top:28px;text-align:center}

/* ── BUTTONS ──────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--r);
  border:none;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;
  transition:all .15s;white-space:nowrap;line-height:1}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#3a7de8;transform:translateY(-1px)}
.btn-purple{background:var(--accent2);color:#fff}
.btn-purple:hover{background:#6a4de8}
.btn-green{background:var(--accent3);color:#0a1a12}
.btn-green:hover{background:#24b88a}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(247,92,92,.15);color:var(--red);border:1px solid rgba(247,92,92,.3)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid transparent}
.btn-ghost:hover{color:var(--text);background:var(--surface2)}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-xs{padding:4px 10px;font-size:11px}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* ── LAYOUT ───────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;padding:20px 0}
.sidebar-brand{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar-brand-name{font-size:16px;font-weight:700;letter-spacing:-.02em;
  background:linear-gradient(130deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-org{font-size:11px;color:var(--muted);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-section{padding:0 12px;margin-bottom:4px}
.nav-section-label{font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;
  cursor:pointer;transition:all .15s;color:var(--text2);font-size:13px;font-weight:500;
  text-decoration:none;border:none;background:none;width:100%;font-family:var(--font)}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(79,142,247,.12);color:var(--accent);font-weight:600}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.user-info{overflow:hidden}
.user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:var(--muted)}
.main{flex:1;overflow-y:auto;background:var(--bg)}
.page{padding:32px;max-width:1200px}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px}
.page-title{font-size:24px;font-weight:700;letter-spacing:-.02em}
.page-sub{color:var(--muted);font-size:13px;margin-top:3px}

/* ── CARDS ────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.card-sm{padding:14px}

/* ── STATS ────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px}
.stat-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:700;letter-spacing:-.02em}
.stat-value.blue{color:var(--accent)}
.stat-value.purple{color:var(--accent2)}
.stat-value.green{color:var(--accent3)}
.stat-value.yellow{color:var(--yellow)}

/* ── TABLE ────────────────────────────── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border)}
td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}

/* ── BADGES ───────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;
  font-size:11px;font-weight:600;letter-spacing:.02em}
.badge-blue{background:rgba(79,142,247,.15);color:var(--accent)}
.badge-purple{background:rgba(124,92,252,.15);color:var(--accent2)}
.badge-green{background:rgba(45,212,160,.15);color:var(--accent3)}
.badge-red{background:rgba(247,92,92,.15);color:var(--red)}
.badge-yellow{background:rgba(247,201,79,.15);color:var(--yellow)}
.badge-gray{background:var(--surface2);color:var(--text2)}

/* ── MODAL ────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;
  align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.6)}
.modal-lg{max-width:780px}
.modal-header{padding:24px 28px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:18px;font-weight:700;letter-spacing:-.02em}
.modal-body{padding:24px 28px 28px}
.modal-close{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  color:var(--muted);cursor:pointer;font-size:18px;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-close:hover{color:var(--text)}
.modal-footer{padding:0 28px 28px;display:flex;gap:10px;justify-content:flex-end}

/* ── SCORE BAR ────────────────────────── */
.score-bar-wrap{display:flex;align-items:center;gap:10px}
.score-bar-bg{flex:1;height:6px;background:var(--surface3);border-radius:99px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:99px;transition:width .4s}
.score-num{font-size:13px;font-weight:700;font-family:var(--mono);min-width:36px;text-align:right}

/* ── SCORE BUTTONS (1-5) ──────────────── */
.score-btns{display:flex;gap:5px}
.score-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--surface2);color:var(--muted);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;font-family:var(--font)}
.score-btn:hover{border-color:var(--accent);color:var(--accent)}
.score-btn.active-1{border-color:var(--red);background:rgba(247,92,92,.15);color:var(--red)}
.score-btn.active-2{border-color:var(--orange);background:rgba(247,131,79,.15);color:var(--orange)}
.score-btn.active-3{border-color:var(--yellow);background:rgba(247,201,79,.15);color:var(--yellow)}
.score-btn.active-4{border-color:var(--accent3);background:rgba(45,212,160,.12);color:var(--accent3)}
.score-btn.active-5{border-color:var(--accent);background:rgba(79,142,247,.15);color:var(--accent)}

/* ── PIPELINE ─────────────────────────── */
.pipeline{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px}
.pipeline-col{min-width:200px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r2);padding:14px}
.pipeline-col-header{font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.07em;color:var(--muted);margin-bottom:12px;display:flex;
  align-items:center;justify-content:space-between}
.pipeline-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.pipeline-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.pipeline-name{font-size:13px;font-weight:600;margin-bottom:4px}
.pipeline-pos{font-size:12px;color:var(--muted)}

/* ── TABS ─────────────────────────────── */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{padding:10px 16px;border:none;background:none;color:var(--muted);
  font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── REQUIREMENT ROW ──────────────────── */
.req-row{display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.req-name{flex:1;font-size:13px;font-weight:500}
.req-category{font-size:11px;color:var(--muted)}
.weight-select{background:var(--surface);border:1px solid var(--border);border-radius:6px;
  padding:4px 8px;color:var(--text);font-size:12px;font-weight:600;cursor:pointer}
.must-toggle{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--border);
  background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:12px;transition:all .2s}
.must-toggle.on{border-color:var(--red);background:rgba(247,92,92,.15);color:var(--red)}

/* ── NOTES TIMER ──────────────────────── */
.timer-display{font-family:var(--mono);font-size:28px;font-weight:500;color:var(--accent);letter-spacing:.05em}
.note-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.note-time{font-family:var(--mono);font-size:11px;color:var(--accent);min-width:50px;padding-top:2px}
.note-text{font-size:13px;flex:1}
.note-star{color:var(--yellow)}

/* ── SHARE CODE ───────────────────────── */
.share-code-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:16px 20px;display:flex;align-items:center;gap:12px}
.share-code{font-family:var(--mono);font-size:20px;font-weight:500;letter-spacing:.1em;color:var(--accent);flex:1}

/* ── COMPARISON ───────────────────────── */
.compare-table{width:100%;border-collapse:collapse}
.compare-table th,.compare-table td{padding:12px 16px;border:1px solid var(--border);text-align:left}
.compare-table th{background:var(--surface2);font-size:12px;font-weight:700;
  color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.compare-table .req-col{font-size:13px;font-weight:500}
.compare-table .score-cell{text-align:center}

/* ── REF CHECK ────────────────────────── */
.ref-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
.ref-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ref-name{font-size:14px;font-weight:600}
.ref-meta{font-size:12px;color:var(--muted)}

/* ── EXTERNAL SCORER ──────────────────── */
.external-bg{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.external-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px;width:100%;max-width:620px}

/* ── MISC ─────────────────────────────── */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:13px;margin-bottom:20px}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}
.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.text-muted{color:var(--muted)}.text-sm{font-size:12px}.text-xs{font-size:11px}
.font-bold{font-weight:700}.font-mono{font-family:var(--mono)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;
  background:var(--surface2);border:1px solid var(--border);font-size:12px;color:var(--text2)}
.chip-remove{cursor:pointer;color:var(--muted);font-size:14px;line-height:1}
.chip-remove:hover{color:var(--red)}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted);margin-bottom:12px}
.info-row{display:flex;gap:6px;align-items:baseline;margin-bottom:6px}
.info-key{font-size:12px;color:var(--muted);min-width:120px}
.info-val{font-size:13px;font-weight:500}
.highlight-box{background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.2);
  border-radius:10px;padding:14px 16px}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>

/* ═══════════════════════════════════════

/* ═══════════════════════════════════════

/* ═══════════════════════════════════════

const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';

const STAGES = ['Applied','Screening','Interview','Final Round','Offer','Hired','Rejected'];
const STAGE_COLORS = {Applied:'badge-gray',Screening:'badge-blue',Interview:'badge-purple',
  'Final Round':'badge-yellow','Offer':'badge-green',Hired:'badge-green',Rejected:'badge-red'};

function calcWeightedScore(scores, requirements) {
  // scores = {reqId: {score, weight}} or position requirements have weight
  let total=0, max=0;
  requirements.forEach(req => {
    const s = scores[req.id];
    if (s && s.score) {
      const w = req.weight || 1;
      total += s.score * w;
      max += 5 * w;
    }
  });
  if (max===0) return null;
  return Math.round((total/max)*100);
}

/* ═══════════════════════════════════════
   AI REQUIREMENT EXTRACTION (simulated)
   ═══════════════════════════════════════ */
function extractRequirementsFromJD(jdText) {
  const text = jdText.toLowerCase();
  const matches = [];
  const checks = [
    ['experience','3+ years in similar role'],
    ['early stage','Early stage company experience'],
    ['dtc','Direct-to-consumer (DTC) experience'],
    ['direct-to-consumer','Direct-to-consumer (DTC) experience'],
    ['ecommerce','E-commerce background'],
    ['e-commerce','E-commerce background'],
    ['team','Managed teams of 5+'],
    ['leadership','Cross-functional leadership'],
    ['board','Board presentation experience'],
    ['financial model','Financial modeling proficiency'],
    ["fp&a",'FP&A experience'],
    ['cac','CAC/LTV metrics experience'],
    ['ltv','CAC/LTV metrics experience'],
    ['sql','SQL / data analysis'],
    ['data','SQL / data analysis'],
    ['startup','Series A/B startup experience'],
    ['series a','Series A/B startup experience'],
  ];
  const seen = new Set();
  checks.forEach(([keyword, req]) => {
    if (text.includes(keyword) && !seen.has(req)) {
      seen.add(req);
      matches.push({ id: uid(), name: req, weight: 1, mustHave: false, custom: false });
    }
  });
  return matches;
}

/* ═══════════════════════════════════════
   PDF / FILE TEXT EXTRACTION HELPER
   ═══════════════════════════════════════ */
async function readJDFile(file, callback) {
  if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
    try {
      const pdfjsLib = window['pdfjs-dist/build/pdf'];
      // Use fake worker to avoid CORS issues with worker scripts
      pdfjsLib.GlobalWorkerOptions.workerSrc = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js`;
      const arrayBuffer = await file.arrayBuffer();
      const typedArray = new Uint8Array(arrayBuffer);
      const pdfDoc = await pdfjsLib.getDocument(typedArray).promise;
      let text = '';
      for (let p = 1; p <= pdfDoc.numPages; p++) {
        const page = await pdfDoc.getPage(p);
        const tc = await page.getTextContent();
        text += tc.items.map(i => i.str).join(' ') + '\n';
      }
      const result = text.trim();
      callback(result.length > 50 ? result : 'PDF text could not be extracted. Please paste the job description below.');
    } catch(err) {
      console.warn('PDF.js error:', err);
      callback('PDF could not be read. Please paste the job description text below.');
    }
  } else {
    // Plain text / doc
    const reader = new FileReader();
    reader.onload = ev => callback(ev.target.result);
    reader.onerror = () => callback('File could not be read. Please paste the text below.');
    reader.readAsText(file);
  }
}

/* ═══════════════════════════════════════
   AUTH SCREEN
   ═══════════════════════════════════════ */
function AuthScreen({ onAuth }) {
  const [tab, setTab] = useState('signup');
  const [form, setForm] = useState({ email:'', password:'', name:'', org:'' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const update = (k,v) => setForm(f=>({...f,[k]:v}));

  const handleSubmit = async () => {
    setLoading(true); setError('');
    if (DEMO_MODE) {
      const users = storage.get('hcc_users', []);
      if (tab === 'signup') {
        if (!form.email || !form.password || !form.name || !form.org) { setError('Please fill all fields.'); setLoading(false); return; }
        const exists = users.find(u => u.email === form.email);
        if (exists) { setError('Email already registered.'); setLoading(false); return; }
        const org = { id: uid(), name: form.org, ownerId: '', createdAt: today() };
        const user = { id: uid(), email: form.email, password: form.password, name: form.name, orgId: org.id, role: 'owner' };
        org.ownerId = user.id;
        users.push(user);
        const orgs = storage.get('hcc_orgs', []);
        orgs.push(org);
        storage.set('hcc_users', users);
        storage.set('hcc_orgs', orgs);
        storage.set('hcc_session', {...user, expiresAt: Date.now() + 30*24*60*60*1000});
        onAuth(user, org);
      } else {
        const user = users.find(u => u.email === form.email && u.password === form.password);
        if (!user) { setError('Invalid email or password.'); setLoading(false); return; }
        const org = storage.get('hcc_orgs', []).find(o => o.id === user.orgId);
        storage.set('hcc_session', {...user, expiresAt: Date.now() + 30*24*60*60*1000});
        onAuth(user, org);
      }
      setLoading(false);
      return;
    }
    // Supabase mode
    try {
      if (tab === 'signup') {
        if (!form.email || !form.password || !form.name || !form.org) { setError('Please fill all fields.'); setLoading(false); return; }
        const { data: authData, error: authErr } = await supabase.auth.signUp({ email: form.email, password: form.password });
        if (authErr) { setError(authErr.message); setLoading(false); return; }
        const userId = authData.user.id;
        const { data: orgData, error: orgErr } = await supabase.from('organizations').insert({ name: form.org, owner_id: userId }).select().single();
        if (orgErr) { setError(orgErr.message); setLoading(false); return; }
        const { error: profErr } = await supabase.from('profiles').insert({ id: userId, org_id: orgData.id, name: form.name, email: form.email, role: 'owner' });
        if (profErr) { setError(profErr.message); setLoading(false); return; }
        const user = { id: userId, name: form.name, email: form.email, orgId: orgData.id, role: 'owner' };
        onAuth(user, orgData);
      } else {
        const { data: authData, error: authErr } = await supabase.auth.signInWithPassword({ email: form.email, password: form.password });
        if (authErr) { setError(authErr.message); setLoading(false); return; }
        const userId = authData.user.id;
        const { data: profile, error: profErr } = await supabase.from('profiles').select('*').eq('id', userId).single();
        if (profErr) { setError('Could not load profile.'); setLoading(false); return; }
        const { data: org } = await supabase.from('organizations').select('*').eq('id', profile.org_id).single();
        const user = { id: userId, name: profile.name, email: profile.email, orgId: profile.org_id, role: profile.role };
        onAuth(user, org);
      }
    } catch(e) {
      setError('Something went wrong: ' + e.message);
    }
    setLoading(false);
  };

  return (
    <div className="auth-bg">
      <div className="auth-card">
        <div className="auth-brand">Hiring Command Center</div>
        <div className="auth-tagline">Your end-to-end hiring platform</div>
        {DEMO_MODE && (
          <div className="highlight-box mb-4" style={{fontSize:12,color:'var(--accent)'}}>
            🔵 Running in Demo Mode — data saved to this browser
          </div>
        )}
        <div className="auth-tabs">
          <button className={`auth-tab ${tab==='signup'?'active':''}`} onClick={()=>setTab('signup')}>Create Account</button>
          <button className={`auth-tab ${tab==='signin'?'active':''}`} onClick={()=>setTab('signin')}>Sign In</button>
        </div>
        {tab === 'signup' && <>
          <div className="field"><label>Your Name</label><input placeholder="Ben Fischman" value={form.name} onChange={e=>update('name',e.target.value)}/></div>
          <div className="field"><label>Company / Organization</label><input placeholder="Your Company" value={form.org} onChange={e=>update('org',e.target.value)}/></div>
        </>}
        <div className="field"><label>Email</label><input type="email" placeholder="you@company.com" value={form.email} onChange={e=>update('email',e.target.value)}/></div>
        <div className="field"><label>Password</label><input type="password" placeholder="••••••••" value={form.password} onChange={e=>update('password',e.target.value)}/></div>
        {error && <div className="error-msg">{error}</div>}
        <button className="btn btn-primary btn-full mt-4" onClick={handleSubmit} disabled={loading}>
          {loading ? 'Please wait...' : tab==='signup' ? 'Create Account & Org' : 'Sign In'}
        </button>
      </div>
    </div>
  );
}

  const update = (k,v) => setForm(f=>({...f,[k]:v}));

  const extractFromJD = () => {
    setExtracting(true);
    setTimeout(() => {
      const extracted = extractRequirementsFromJD(jdInput || form.jd);
      const existing = form.requirements.map(r=>r.name);
      const newOnes = extracted.filter(r=>!existing.includes(r.name));
      setForm(f=>({...f, jd: jdInput||f.jd, requirements:[...f.requirements,...newOnes]}));
      setExtracting(false);
    }, 800);
  };

    if (form.requirements.find(r=>r.name===req.name)) return;
    setForm(f=>({...f, requirements:[...f.requirements,{id:uid(),name:req.name,weight:1,mustHave:false}]}));
  };

    if (!customReq.trim()) return;
    setForm(f=>({...f, requirements:[...f.requirements,{id:uid(),name:customReq.trim(),weight:1,mustHave:false}]}));
    setCustomReq('');
  };

  const removeReq = id => setForm(f=>({...f, requirements:f.requirements.filter(r=>r.id!==id)}));

' + form.jd.slice(0,4000)

                  </button>
                  <button className="btn btn-ghost btn-xs" onClick={()=>removeReq(req.id)}>✕</button>
                </div>
              </div>
            ))}
            <hr className="divider"/>
            <div className="section-title">Add Custom Requirement</div>
            <div className="flex gap-2 mb-4">

  );

function CandidatesView({ candidates, setCandidates, positions }) {
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [filterPos, setFilterPos] = useState('all');
  const [filterStage, setFilterStage] = useState('all');

  const filtered = candidates.filter(c=>
    (filterPos==='all'||c.positionId===filterPos) &&
    (filterStage==='all'||c.stage===filterStage)
  );

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <div className="page-title">Candidates</div>
          <div className="page-sub">{filtered.length} showing</div>
        </div>
        <button className="btn btn-primary" onClick={()=>{setEditing(null);setShowModal(true)}}>+ Add Candidate</button>
      </div>
      <div className="flex gap-2 mb-4">
        <select value={filterPos} onChange={e=>setFilterPos(e.target.value)} style={{maxWidth:220}}>
          <option value="all">All Positions</option>
          {positions.map(p=><option key={p.id} value={p.id}>{p.title}</option>)}
        </select>
        <select value={filterStage} onChange={e=>setFilterStage(e.target.value)} style={{maxWidth:180}}>
          <option value="all">All Stages</option>
          {STAGES.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
      </div>
      {filtered.length===0
        ? <div className="empty-state"><div className="empty-icon">👤</div><div className="empty-title">No candidates yet</div><div className="empty-sub">Add candidates to start evaluating.</div></div>
        : <div className="card" style={{padding:0}}>
            <div className="table-wrap"><table>
              <thead><tr><th>Name</th><th>Position</th><th>Stage</th><th>Score</th><th>Added</th><th></th></tr></thead>
              <tbody>
                {filtered.map(c=>{
                  const pos = positions.find(p=>p.id===c.positionId);
                  const score = pos && c.scores ? calcWeightedScore(c.scores, pos.requirements||[]) : null;
                  return <tr key={c.id}>
                    <td><div style={{fontWeight:600}}>{c.name}</div><div className="text-xs text-muted">{c.email||''}</div></td>
                    <td>{pos?.title||'—'}</td>
                    <td><span className={`badge ${STAGE_COLORS[c.stage]||'badge-gray'}`}>{c.stage}</span></td>
                    <td style={{minWidth:140}}><ScoreBar score={score}/></td>
                    <td className="text-muted">{fmtDate(c.createdAt)}</td>
                    <td>
                      <div className="flex gap-2">
                        <button className="btn btn-ghost btn-sm" onClick={()=>{setEditing(c);setShowModal(true)}}>Edit</button>
                        <button className="btn btn-danger btn-sm" onClick={()=>setCandidates(cs=>cs.filter(x=>x.id!==c.id))}>✕</button>
                      </div>
                    </td>
                  </tr>;
                })}
              </tbody>
            </table></div>
          </div>
      }
      {showModal && <CandidateModal
        candidate={editing}
        positions={positions}
        onSave={c=>{
          if(editing) setCandidates(cs=>cs.map(x=>x.id===c.id?c:x));
          else setCandidates(cs=>[...cs,{...c,id:uid(),createdAt:today(),scores:{}}]);
          setShowModal(false);
        }}
        onClose={()=>setShowModal(false)}
      />}
    </div>
  );
}

function CandidateModal({ candidate, positions, onSave, onClose }) {

  const [liError, setLiError] = useState('');
  const update = (k,v) => setForm(f=>({...f,[k]:v}));

  const parseLinkedIn = async () => {
    if (!liText.trim()) return;
    setLiLoading(true); setLiError('');
    try {
      const response = await fetch('https://sncfmxqwpfxhztaxuhdu.supabase.co/functions/v1/claude-proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompt: `Extract candidate information from this LinkedIn profile text. Return ONLY a JSON object with no markdown, no backticks:
{
  "name": "full name",
  "email": "email if visible or empty string",
  "phone": "phone if visible or empty string",
  "linkedIn": "linkedin url if visible or empty string",
  "currentTitle": "current job title",
  "currentCompany": "current company",
  "notes": "2-3 sentence summary of their background and experience"
}

LinkedIn profile text:
${liText.slice(0, 3000)}` }]
        })
      });
      const data = await response.json();

      const text = data.text.replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(text);
      setForm(f => ({
        ...f,
        name: parsed.name || f.name,
        email: parsed.email || f.email,
        phone: parsed.phone || f.phone,
        linkedIn: parsed.linkedIn || f.linkedIn,
        notes: [parsed.currentTitle, parsed.currentCompany, parsed.notes].filter(Boolean).join(' | ')

      setShowLinkedIn(false);
      setLiText('');
    } catch(e) {
      setLiError('Could not parse profile: ' + e.message);

  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>

                <div className="flex items-center gap-2">
                  <span style={{fontSize:18}}>💼</span>
                  <span style={{fontSize:13,fontWeight:600,color:'#0a66c2'}}>Import from LinkedIn</span>
                  <span style={{fontSize:11,color:'var(--muted)'}}>Paste profile text → Claude fills the form</span>
                </div>
                <button className="btn btn-sm" style={{background:'#0a66c2',color:'#fff'}} onClick={()=>setShowLinkedIn(true)}>Import</button>
              </div>
            : <div className="mb-4 p-3" style={{background:'rgba(10,102,194,.08)',border:'1px solid rgba(10,102,194,.3)',borderRadius:8}}>
                <div className="flex items-center justify-between mb-2">
                  <div style={{fontSize:13,fontWeight:600,color:'#0a66c2'}}>💼 Paste LinkedIn Profile Text</div>
                  <button className="btn btn-ghost btn-xs" onClick={()=>setShowLinkedIn(false)}>✕</button>
                </div>
                <div style={{fontSize:11,color:'var(--muted)',marginBottom:8}}>

                <textarea style={{minHeight:100,fontSize:12}} placeholder="Paste LinkedIn profile text here..." value={liText} onChange={e=>setLiText(e.target.value)}/>
                {liError && <div style={{color:'var(--red)',fontSize:11,marginTop:4}}>{liError}</div>}

          </div>

/* ═══════════════════════════════════════
   SCORECARDS
   ═══════════════════════════════════════ */
function ScorecardsView({ candidates, setCandidates, positions }) {
  const [selPos, setSelPos] = useState('');
  const [selCand, setSelCand] = useState('');

  const pos = positions.find(p=>p.id===selPos);
  const cand = candidates.find(c=>c.id===selCand);
  const posForCand = pos || (cand ? positions.find(p=>p.id===cand.positionId) : null);

  const candsByPos = selPos ? candidates.filter(c=>c.positionId===selPos) : candidates;

  const setScore = (reqId, field, val) => {
    setCandidates(cs => cs.map(c => {
      if (c.id !== selCand) return c;
      return { ...c, scores: { ...c.scores, [reqId]: { ...(c.scores||{})[reqId], [field]: val } } };
    }));
  };

  const overallScore = posForCand && cand?.scores ? calcWeightedScore(cand.scores, posForCand.requirements||[]) : null;

  return (
    <div className="page">
      <div className="page-header">
        <div><div className="page-title">Scorecards</div><div className="page-sub">Rate candidates against position requirements</div></div>
      </div>
      <div className="grid-2 mb-4">
        <div className="field" style={{margin:0}}>
          <label>Position</label>
          <select value={selPos} onChange={e=>{setSelPos(e.target.value);setSelCand('')}}>
            <option value="">All Positions</option>
            {positions.map(p=><option key={p.id} value={p.id}>{p.title}</option>)}
          </select>
        </div>
        <div className="field" style={{margin:0}}>
          <label>Candidate</label>
          <select value={selCand} onChange={e=>setSelCand(e.target.value)}>
            <option value="">Select Candidate...</option>
            {candsByPos.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
      </div>

      {!selCand && <div className="empty-state"><div className="empty-icon">📊</div><div className="empty-title">Select a candidate to score</div></div>}

      {selCand && cand && posForCand && <>
        <div className="flex items-center justify-between mb-4">
          <div>
            <div style={{fontWeight:700,fontSize:18}}>{cand.name}</div>
            <div className="text-muted text-sm">{posForCand.title} · {cand.stage}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div className="text-muted text-xs mb-1">Overall Score</div>
            <div style={{fontSize:28,fontWeight:700,color:overallScore>=80?'var(--accent3)':overallScore>=60?'var(--accent)':overallScore?'var(--yellow)':'var(--muted)'}}>
              {overallScore!=null?`${overallScore}%`:'—'}
            </div>
          </div>
        </div>

        {(posForCand.requirements||[]).length===0
          ? <div className="card"><div className="text-muted text-sm">No requirements set for this position. Add requirements to the position first.</div></div>
          : <div className="card" style={{padding:0}}>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr>
                  <th style={{padding:'12px 16px'}}>Requirement</th>
                  <th style={{padding:'12px 16px'}}>Weight</th>
                  <th style={{padding:'12px 16px'}}>Score</th>
                  <th style={{padding:'12px 16px'}}>Notes</th>
                </tr></thead>
                <tbody>
                  {(posForCand.requirements||[]).map(req=>{
                    const s = (cand.scores||{})[req.id]||{};
                    return <tr key={req.id}>
                      <td style={{padding:'12px 16px'}}>
                        <div style={{fontWeight:500}}>{req.name}</div>
                        {req.mustHave && <span className="badge badge-red mt-1" style={{fontSize:10}}>Must Have</span>}
                      </td>
                      <td style={{padding:'12px 16px',color:'var(--muted)',fontSize:12}}>{req.weight}×</td>
                      <td style={{padding:'12px 16px'}}>
                        <ScoreBtns value={s.score} onChange={v=>setScore(req.id,'score',v)}/>
                        {s.score && <div style={{fontSize:10,color:'var(--muted)',marginTop:4}}>{scoreLabel(s.score)}</div>}
                      </td>
                      <td style={{padding:'8px 16px'}}>
                        <input style={{fontSize:12,padding:'6px 10px'}} placeholder="Add note..." value={s.note||''} onChange={e=>setScore(req.id,'note',e.target.value)}/>
                      </td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>
        }

        <div className="card mt-4">
          <div className="section-title">Overall Recommendation</div>
          <div className="flex gap-2 mb-3" style={{flexWrap:'wrap'}}>
            {['Strong Yes','Yes','Maybe','No','Strong No'].map(r=>(
              <button key={r}
                className={`btn btn-sm ${cand.recommendation===r?'btn-primary':'btn-secondary'}`}
                onClick={()=>setCandidates(cs=>cs.map(c=>c.id===selCand?{...c,recommendation:r}:c))}>
                {r}
              </button>
            ))}
          </div>
          <div className="field" style={{margin:0}}>
            <label>Overall Notes</label>
            <textarea placeholder="Overall impression and reasoning..." value={cand.overallNotes||''} onChange={e=>setCandidates(cs=>cs.map(c=>c.id===selCand?{...c,overallNotes:e.target.value}:c))}/>
          </div>
        </div>
      </>}
    </div>
  );
}

function RequirementsView({ requirements, setRequirements }) {
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ name:'', category:'' });
  const categories = [...new Set(requirements.map(r=>r.category))];

  const save = () => {
    if (!form.name||!form.category) return;
    setRequirements(rs=>[...rs,{...form,id:uid()}]);
    setForm({name:'',category:''});
    setShowModal(false);
  };

  return (
    <div className="page">
      <div className="page-header">
        <div><div className="page-title">Requirements Library</div><div className="page-sub">Reusable criteria for scoring candidates</div></div>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}>+ Add Requirement</button>
      </div>
      {categories.map(cat=>(
        <div key={cat} className="card mb-4">
          <div className="section-title">{cat}</div>
          {requirements.filter(r=>r.category===cat).map(r=>(
            <div key={r.id} className="flex items-center justify-between" style={{padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
              <div style={{fontSize:13,fontWeight:500}}>{r.name}</div>
              <button className="btn btn-danger btn-xs" onClick={()=>setRequirements(rs=>rs.filter(x=>x.id!==r.id))}>Remove</button>
            </div>
          ))}
        </div>
      ))}
      {showModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <div className="modal-header"><div className="modal-title">Add Requirement</div><button className="modal-close" onClick={()=>setShowModal(false)}>×</button></div>
            <div className="modal-body">
              <div className="field"><label>Requirement Name *</label><input placeholder="e.g. 5+ years in SaaS" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
              <div className="field"><label>Category *</label>
                <input list="cats" placeholder="Experience, Leadership, Technical, Culture..." value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}/>
                <datalist id="cats">{categories.map(c=><option key={c} value={c}/>)}</datalist>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={save}>Add to Library</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   JD BUILDER
   ═══════════════════════════════════════ */
function JDBuilderView({ positions, setPositions, requirements: reqLib }) {
  const [mode, setMode] = useState(''); // 'manual' or 'ai'
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({ title:'', department:'', location:'', level:'Mid', description:'', responsibilities:'', qualifications:'', requirements:[] });
  const [generated, setGenerated] = useState('');
  const [aiPrompt, setAiPrompt] = useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState('');
  const update = (k,v) => setForm(f=>({...f,[k]:v}));

  // ── AI Generation ──────────────────────────────
  const generateWithClaude = async () => {
    if (!aiPrompt.trim()) return;
    setAiLoading(true); setAiError('');
    try {
      const response = await fetch('https://sncfmxqwpfxhztaxuhdu.supabase.co/functions/v1/claude-proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompt: `You are an expert recruiter and talent acquisition specialist. Create a compelling, detailed job description based on the following information:

${aiPrompt}

Return a JSON object with these exact fields (no markdown, no backticks, just raw JSON):
{
  "title": "job title",
  "department": "department name",
  "location": "location or Remote",
  "level": "one of: Junior, Mid, Senior, Lead, Director, VP, C-Level",
  "description": "2-3 sentence role overview",
  "responsibilities": "bullet points starting with •, one per line, 5-7 items",
  "qualifications": "bullet points starting with •, one per line, 5-7 items",
  "requirements": ["requirement 1", "requirement 2", "requirement 3", "requirement 4", "requirement 5"]
}`
          }]
        })
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      const text = data.text.replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(text);
      setForm(f => ({
        ...f,
        title: parsed.title || f.title,
        department: parsed.department || f.department,
        location: parsed.location || f.location,
        level: parsed.level || f.level,
        description: parsed.description || f.description,
        responsibilities: parsed.responsibilities || f.responsibilities,
        qualifications: parsed.qualifications || f.qualifications,
        requirements: (parsed.requirements||[]).map(r => ({ id: uid(), name: r, weight: 1, mustHave: false }))
      }));
      setMode('manual');
      setStep(1);
    } catch(e) {
      setAiError('Error: ' + e.message + '. Please try again or use manual mode.');
    }
    setAiLoading(false);
  };

  // ── Manual generation ──────────────────────────
  const generateJD = () => {
    const jd = `# ${form.title}
**Department:** ${form.department} | **Location:** ${form.location} | **Level:** ${form.level}

## About the Role
${form.description}

## Key Responsibilities
${form.responsibilities}

## Qualifications
${form.qualifications}

## What We're Looking For
${form.requirements.map(r=>`• ${r.name}`).join('\n')}`;
    setGenerated(jd);
    setStep(3);
  };

  const createPosition = () => {
    const newPos = {
      id: uid(), title: form.title, department: form.department, location: form.location,
      jd: generated, requirements: form.requirements, status: 'Open', createdAt: today()
    };
    setPositions(ps=>[...ps,newPos]);
    alert(`Position "${form.title}" created!`);
    setMode(''); setStep(1);
    setForm({ title:'', department:'', location:'', level:'Mid', description:'', responsibilities:'', qualifications:'', requirements:[] });
    setGenerated('');
  };

  const categories = [...new Set(reqLib.map(r=>r.category))];
  const toggleReq = (req) => {
    const exists = form.requirements.find(r=>r.name===req.name);
    if (exists) setForm(f=>({...f,requirements:f.requirements.filter(r=>r.name!==req.name)}));
    else setForm(f=>({...f,requirements:[...f.requirements,{id:uid(),name:req.name,weight:1,mustHave:false}]}));

  // ── Mode selector ──────────────────────────────
  if (!mode) return (
    <div className="page">
      <div className="page-header">
        <div><div className="page-title">JD Builder</div><div className="page-sub">Create a job description your way</div></div>

        <div className="card" style={{cursor:'pointer',border:'1px solid var(--border)',transition:'all .2s'}}
          onClick={()=>setMode('ai')}
          onMouseEnter={e=>e.currentTarget.style.borderColor='var(--accent2)'}
          onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
          <div style={{fontSize:36,marginBottom:12}}>✨</div>
          <div style={{fontSize:17,fontWeight:700,marginBottom:8}}>Let Claude Write It</div>
          <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.6}}>
            Tell Claude about the role in plain language — who you need, what they'll do, what matters most. Claude will generate a complete, polished JD instantly.
          </div>
          <div className="btn btn-purple mt-4" style={{display:'inline-flex'}}>Use AI →</div>
        </div>
        <div className="card" style={{cursor:'pointer',border:'1px solid var(--border)',transition:'all .2s'}}
          onClick={()=>setMode('manual')}
          onMouseEnter={e=>e.currentTarget.style.borderColor='var(--accent)'}
          onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
          <div style={{fontSize:36,marginBottom:12}}>📝</div>
          <div style={{fontSize:17,fontWeight:700,marginBottom:8}}>Build It Yourself</div>
          <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.6}}>
            Fill in the details step by step — title, responsibilities, qualifications, and requirements. Full control over every word.
          </div>
          <div className="btn btn-secondary mt-4" style={{display:'inline-flex'}}>Manual →</div>
        </div>
      </div>
    </div>
  );

  // ── AI Mode ────────────────────────────────────
  if (mode === 'ai') return (
    <div className="page">
      <div className="page-header">
        <div><div className="page-title">✨ AI JD Builder</div><div className="page-sub">Describe the role and Claude will do the rest</div></div>
        <button className="btn btn-ghost" onClick={()=>setMode('')}>← Back</button>
      </div>
      <div className="card" style={{maxWidth:700}}>
        <div className="section-title">Tell Claude About This Role</div>
        <div style={{fontSize:13,color:'var(--muted)',marginBottom:16,lineHeight:1.7}}>
          Write naturally — like you're explaining the role to a friend. Include the title, what the person will do, what kind of experience you need, and anything else that matters. More detail = better JD.
        </div>
        <div className="highlight-box mb-4" style={{fontSize:12,color:'var(--muted)'}}>
          <strong style={{color:'var(--text2)'}}>Example:</strong> "We need a VP of Marketing for our DTC coffee brand. This person will own the full funnel — paid social, email, influencer, and brand. We're Series A, about 30 people. Need someone who's scaled a DTC brand before, ideally in food & bev. Based in NYC but remote-friendly. They'll manage a team of 4 and report to me."

          </button>

        </div>

  // ── Manual Mode ────────────────────────────────

    <div className="page">
      <div className="page-header">
        <div><div className="page-title">📝 JD Builder</div><div className="page-sub">Build your job description step by step</div></div>
        <button className="btn btn-ghost" onClick={()=>setMode('')}>← Back</button>
      </div>
      <div className="flex gap-2 mb-4">
        {['1. Basic Info','2. Requirements','3. Review & Create'].map((s,i)=>(
          <div key={i} className="flex items-center gap-2">
            <div style={{width:24,height:24,borderRadius:'50%',background:step===i+1?'var(--accent)':step>i+1?'var(--accent3)':'var(--surface2)',
              border:`1px solid ${step>=i+1?'transparent':'var(--border)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>
              {step>i+1?'✓':i+1}
            </div>
            <span style={{fontSize:13,fontWeight:step===i+1?600:400,color:step===i+1?'var(--text)':'var(--muted)'}}>{s}</span>
            {i<2 && <span style={{color:'var(--border)',margin:'0 4px'}}>›</span>}
          </div>
        ))}
      </div>

      {step===1 && <div className="card">
        <div className="grid-2">
          <div className="field"><label>Job Title *</label><input placeholder="Head of Growth" value={form.title} onChange={e=>update('title',e.target.value)}/></div>
          <div className="field"><label>Department</label><input placeholder="Marketing" value={form.department} onChange={e=>update('department',e.target.value)}/></div>
        </div>
        <div className="grid-2">
          <div className="field"><label>Location</label><input placeholder="Remote / New York, NY" value={form.location} onChange={e=>update('location',e.target.value)}/></div>
          <div className="field"><label>Level</label>
            <select value={form.level} onChange={e=>update('level',e.target.value)}>
              {['Junior','Mid','Senior','Lead','Director','VP','C-Level'].map(l=><option key={l} value={l}>{l}</option>)}
            </select>
          </div>
        </div>
        <div className="field"><label>Role Description</label><textarea placeholder="Brief description of the role and its impact..." value={form.description} onChange={e=>update('description',e.target.value)}/></div>
        <div className="field"><label>Key Responsibilities</label><textarea placeholder="• Drive customer acquisition strategy&#10;• Manage $X budget..." value={form.responsibilities} onChange={e=>update('responsibilities',e.target.value)}/></div>
        <div className="field"><label>Qualifications</label><textarea placeholder="• 5+ years experience&#10;• Proven track record..." value={form.qualifications} onChange={e=>update('qualifications',e.target.value)}/></div>
        <button className="btn btn-primary" onClick={()=>form.title&&setStep(2)} disabled={!form.title}>Next: Requirements →</button>
      </div>}

      {step===2 && <div className="card">
        <div className="section-title">Select Requirements for this Position</div>
        <div className="text-muted text-sm mb-4">Choose from your library. Selected: {form.requirements.length}</div>
        {categories.map(cat=>(
          <div key={cat} className="mb-4">
            <div style={{fontSize:12,fontWeight:600,color:'var(--muted)',marginBottom:8}}>{cat}</div>
            <div className="flex" style={{flexWrap:'wrap',gap:6}}>
              {reqLib.filter(r=>r.category===cat).map(r=>{
                const sel = form.requirements.find(x=>x.name===r.name);
                return <button key={r.id} className="chip" style={sel?{borderColor:'var(--accent)',color:'var(--accent)',background:'rgba(79,142,247,.08)'}:{}} onClick={()=>toggleReq(r)}>
                  {sel?'✓ ':''}{r.name}
                </button>;
              })}
            </div>
          </div>
        ))}
        <div className="flex gap-2 mt-4">
          <button className="btn btn-secondary" onClick={()=>setStep(1)}>← Back</button>
          <button className="btn btn-primary" onClick={generateJD}>Generate JD →</button>
        </div>
      </div>}

      {step===3 && <div className="card">
        <div className="section-title">Generated Job Description</div>
        <textarea style={{minHeight:320,fontFamily:'var(--mono)',fontSize:12,lineHeight:1.7}} value={generated} onChange={e=>setGenerated(e.target.value)}/>
        <div className="flex gap-2 mt-4">
          <button className="btn btn-secondary" onClick={()=>setStep(2)}>← Back</button>
          <button className="btn btn-primary" onClick={createPosition}>✓ Create Position</button>
          <button className="btn btn-ghost" onClick={()=>navigator.clipboard.writeText(generated)}>📋 Copy</button>
        </div>
      </div>}
    </div>
  );
}

/* ═══════════════════════════════════════
   INTERVIEW NOTES
   ═══════════════════════════════════════ */
function InterviewsView({ candidates, setCandidates, positions }) {
  const [selCand, setSelCand] = useState('');
  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [noteInput, setNoteInput] = useState('');
  const timerRef = useRef(null);

  const cand = candidates.find(c=>c.id===selCand);
  const pos = cand ? positions.find(p=>p.id===cand.positionId) : null;

  useEffect(()=>{
    if (running) { timerRef.current = setInterval(()=>setElapsed(e=>e+1),1000); }
    else { clearInterval(timerRef.current); }
    return ()=>clearInterval(timerRef.current);
  },[running]);

  const fmtTime = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  const addNote = (star=false) => {
    if (!noteInput.trim()||!selCand) return;
    const note = { id:uid(), text:noteInput.trim(), time:fmtTime(elapsed), star, createdAt:new Date().toISOString() };
    setCandidates(cs=>cs.map(c=>c.id===selCand?{...c,interviewNotes:[...(c.interviewNotes||[]),note]}:c));
    setNoteInput('');
  };

  const removeNote = (noteId) => setCandidates(cs=>cs.map(c=>c.id===selCand?{...c,interviewNotes:(c.interviewNotes||[]).filter(n=>n.id!==noteId)}:c));

  return (
    <div className="page">
      <div className="page-header">
        <div><div className="page-title">Interview Notes</div><div className="page-sub">Live note-taking with timestamps</div></div>
      </div>
      <div className="field mb-4" style={{maxWidth:300}}>
        <label>Candidate</label>
        <select value={selCand} onChange={e=>{setSelCand(e.target.value);setRunning(false);setElapsed(0)}}>
          <option value="">Select candidate...</option>
          {candidates.map(c=><option key={c.id} value={c.id}>{c.name} — {positions.find(p=>p.id===c.positionId)?.title||'?'}</option>)}
        </select>
      </div>

      {!selCand && <div className="empty-state"><div className="empty-icon">🎙️</div><div className="empty-title">Select a candidate to start</div></div>}

      {selCand && cand && <>
        <div className="card mb-4">
          <div className="flex items-center justify-between">
            <div>
              <div style={{fontWeight:700,fontSize:18}}>{cand.name}</div>
              <div className="text-muted text-sm">{pos?.title}</div>
            </div>
            <div style={{textAlign:'center'}}>
              <div className="timer-display">{fmtTime(elapsed)}</div>
              <div className="flex gap-2 mt-2">
                <button className={`btn btn-sm ${running?'btn-danger':'btn-green'}`} onClick={()=>setRunning(r=>!r)}>
                  {running?'⏸ Pause':'▶ Start Timer'}
                </button>
                <button className="btn btn-secondary btn-sm" onClick={()=>{setRunning(false);setElapsed(0)}}>↺ Reset</button>
              </div>
            </div>
          </div>
        </div>

        <div className="card mb-4">
          <div className="section-title">Add Note</div>
          <textarea placeholder="Type your note... (Enter to save, Shift+Enter for ⭐ highlight)" style={{minHeight:70}} value={noteInput}
            onChange={e=>setNoteInput(e.target.value)}
            onKeyDown={e=>{
              if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addNote(false);}
              if(e.key==='Enter'&&e.shiftKey){e.preventDefault();addNote(true);}
            }}/>
          <div className="flex gap-2 mt-2">
            <button className="btn btn-primary btn-sm" onClick={()=>addNote(false)}>Add Note</button>
            <button className="btn btn-secondary btn-sm" onClick={()=>addNote(true)}>⭐ Add Highlight</button>
          </div>
        </div>

        <div className="card">
          <div className="section-title">Interview Timeline ({(cand.interviewNotes||[]).length} notes)</div>
          {(cand.interviewNotes||[]).length===0 && <div className="text-muted text-sm">No notes yet. Start the timer and take notes above.</div>}
          {(cand.interviewNotes||[]).map(n=>(
            <div key={n.id} className="note-item">
              <div className="note-time">{n.time}</div>
              <div className="note-text">{n.star && <span className="note-star">⭐ </span>}{n.text}</div>
              <button className="btn btn-ghost btn-xs" onClick={()=>removeNote(n.id)}>✕</button>
            </div>
          ))}
        </div>
      </>}
    </div>
  );
}

/* ═══════════════════════════════════════
   REFERENCE CHECKS
   ═══════════════════════════════════════ */
function ReferenceChecksView({ candidates, setCandidates, positions }) {
  const [selCand, setSelCand] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [editingRef, setEditingRef] = useState(null);

  const cand = candidates.find(c=>c.id===selCand);

  const saveRef = (ref) => {
    setCandidates(cs=>cs.map(c=>{
      if(c.id!==selCand) return c;
      const refs = c.references||[];
      if(editingRef) return {...c,references:refs.map(r=>r.id===ref.id?ref:r)};
      return {...c,references:[...refs,{...ref,id:uid()}]};
    }));
    setShowModal(false);
  };

  const removeRef = (refId) => setCandidates(cs=>cs.map(c=>c.id===selCand?{...c,references:(c.references||[]).filter(r=>r.id!==refId)}:c));

  const REF_STATUS_COLORS = { Pending:'badge-yellow', Scheduled:'badge-blue', Completed:'badge-green' };

  return (
    <div className="page">
      <div className="page-header">
        <div><div className="page-title">Reference Checks</div><div className="page-sub">Track and manage candidate references</div></div>
        {selCand && <button className="btn btn-primary" onClick={()=>{setEditingRef(null);setShowModal(true)}}>+ Add Reference</button>}
      </div>
      <div className="field mb-4" style={{maxWidth:300}}>
        <label>Candidate</label>
        <select value={selCand} onChange={e=>setSelCand(e.target.value)}>
          <option value="">Select candidate...</option>
          {candidates.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
      </div>

      {!selCand && <div className="empty-state"><div className="empty-icon">📞</div><div className="empty-title">Select a candidate</div></div>}

      {selCand && cand && <>
        {(cand.references||[]).length===0 && <div className="empty-state"><div className="empty-icon">📞</div><div className="empty-title">No references yet</div><div className="empty-sub">Add references to track check status.</div></div>}
        {(cand.references||[]).map(ref=>(
          <div key={ref.id} className="ref-card">
            <div className="ref-header">
              <div>
                <div className="ref-name">{ref.name}</div>
                <div className="ref-meta">{ref.title} at {ref.company} · {ref.relationship}</div>
              </div>
              <div className="flex items-center gap-2">
                <span className={`badge ${REF_STATUS_COLORS[ref.status]||'badge-gray'}`}>{ref.status}</span>
                <button className="btn btn-ghost btn-sm" onClick={()=>{setEditingRef(ref);setShowModal(true)}}>Edit</button>
                <button className="btn btn-danger btn-sm" onClick={()=>removeRef(ref.id)}>✕</button>
              </div>
            </div>
            {ref.status==='Completed' && <>
              <div className="flex gap-4 mt-2">
                <div className="info-row"><span className="info-key">Overall Rating</span><span className="info-val">{ref.rating?`${ref.rating}/5`:'—'}</span></div>
                <div className="info-row"><span className="info-key">Would Rehire?</span><span className="info-val" style={{color:ref.wouldRehire==='Yes'?'var(--accent3)':ref.wouldRehire==='No'?'var(--red)':'var(--muted)'}}>{ref.wouldRehire||'—'}</span></div>
              </div>
              {ref.notes && <div className="mt-2 text-sm">{ref.notes}</div>}
              {ref.redFlags && <div className="mt-2 p-2 rounded" style={{background:'rgba(247,92,92,.08)',border:'1px solid rgba(247,92,92,.2)',fontSize:12,color:'var(--red)'}}>🚩 {ref.redFlags}</div>}
            </>}
          </div>
        ))}
      </>}

      {showModal && <RefModal ref_={editingRef} onSave={saveRef} onClose={()=>setShowModal(false)}/>}
    </div>
  );
}

function RefModal({ ref_, onSave, onClose }) {
  const [form, setForm] = useState(ref_||{name:'',title:'',company:'',relationship:'Former Manager',phone:'',email:'',status:'Pending',rating:'',wouldRehire:'',notes:'',redFlags:''});
